  assemblies:
  - BLL
  namespace: BLL.DTOs
  summary: Projection of a <code>Rutina</code> (training routine) entity with its associated exercises.
  remarks: >-
    An active routine is identified by a <code>null</code> <xref href="BLL.DTOs.RutinaDTO.Hasta" data-throw-if-not-resolved="false"></xref> value.

    Only one routine per client may be active at a time; creating a new one via

    <code>RutinaService.CrearRutina</code> automatically finalizes the previous active routine.

    <xref href="BLL.DTOs.RutinaDTO.Ejercicios" data-throw-if-not-resolved="false"></xref> is initialized to an empty list on construction.
