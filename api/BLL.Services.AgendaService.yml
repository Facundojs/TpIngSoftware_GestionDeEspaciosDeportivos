- uid: BLL.Services.AgendaService.ConfigurarAgenda(System.Guid,System.Collections.Generic.List{BLL.DTOs.AgendaDTO})
  commentId: M:BLL.Services.AgendaService.ConfigurarAgenda(System.Guid,System.Collections.Generic.List{BLL.DTOs.AgendaDTO})
  id: ConfigurarAgenda(System.Guid,System.Collections.Generic.List{BLL.DTOs.AgendaDTO})
  parent: BLL.Services.AgendaService
  langs:
  - csharp
  - vb
  name: ConfigurarAgenda(Guid, List<AgendaDTO>)
  nameWithType: AgendaService.ConfigurarAgenda(Guid, List<AgendaDTO>)
  fullName: BLL.Services.AgendaService.ConfigurarAgenda(System.Guid, System.Collections.Generic.List<BLL.DTOs.AgendaDTO>)
  type: Method
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/BLL/Services/AgendaService.cs
  assemblies:
  - BLL
  namespace: BLL.Services
  summary: >-
    Atomically replaces the entire agenda of a space by deleting all existing blocks

    and inserting the new set in a single transaction.
  remarks: 'Known limitation: Agenda ranges crossing midnight (e.g., 22:00-02:00) are explicitly prevented by the UI validation here. They must be split into two ranges: 22:00-23:59 and 00:00-02:00.'
  example: []
  syntax:
    content: public void ConfigurarAgenda(Guid espacioId, List<AgendaDTO> agendasDto)
    parameters:
    - id: espacioId
      type: System.Guid
      description: The space whose agenda will be replaced.
    - id: agendasDto
      type: System.Collections.Generic.List{BLL.DTOs.AgendaDTO}
      description: >-
        The new schedule blocks. Each block's <code>HoraDesde</code> must be earlier than <code>HoraHasta</code>.

        Blocks on the same day must not overlap.
    content.vb: Public Sub ConfigurarAgenda(espacioId As Guid, agendasDto As List(Of AgendaDTO))
  overload: BLL.Services.AgendaService.ConfigurarAgenda*
  exceptions:
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: Thrown when <code class="paramref">agendasDto</code> is <code>null</code>.
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: Thrown when a block has <code>HoraDesde &gt;= HoraHasta</code>, or when two blocks on the same day overlap.
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: Thrown if <code class="paramref">agendasDto</code> is <code>null</code>.
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: >-
      Thrown if any block has <code>HoraDesde &gt;= HoraHasta</code>, or if two blocks for the same

      day overlap. Ranges crossing midnight are not supported and must be split.
  nameWithType.vb: AgendaService.ConfigurarAgenda(Guid, List(Of AgendaDTO))
  fullName.vb: BLL.Services.AgendaService.ConfigurarAgenda(System.Guid, System.Collections.Generic.List(Of BLL.DTOs.AgendaDTO))
  name.vb: ConfigurarAgenda(Guid, List(Of AgendaDTO))
