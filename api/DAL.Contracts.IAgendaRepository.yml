  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/DAL/Contracts/IAgendaRepository.cs
  assemblies:
  - DAL
  namespace: DAL.Contracts
  summary: >-
    Repository contract for <xref href="Domain.Entities.Agenda" data-throw-if-not-resolved="false"></xref> records that define the weekly operating

    schedule of a sports space.
  remarks: >-
    Agenda records are managed as a complete set per space: configuration always deletes

    all existing records via <xref href="DAL.Contracts.IAgendaRepository.EliminarPorEspacio(System.Guid)" data-throw-if-not-resolved="false"></xref> and re-inserts the new set

    within the same transaction.
  example: []
  syntax:
    content: public interface IAgendaRepository
    content.vb: Public Interface IAgendaRepository
  derivedClasses:
  - DAL.Impl.AgendaSqlRepository
