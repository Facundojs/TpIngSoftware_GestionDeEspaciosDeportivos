  assemblies:
  - DAL
  namespace: DAL.Contracts
  summary: Retrieves all agenda blocks configured for a given space.
  example: []
  syntax:
    content: List<Agenda> GetByEspacio(Guid espacioId)
    parameters:
    - id: espacioId
      type: System.Guid
      description: The space whose schedule to fetch.
    return:
      type: System.Collections.Generic.List{Domain.Entities.Agenda}
      description: List of agenda blocks; empty list if no schedule is configured.
    content.vb: Function GetByEspacio(espacioId As Guid) As List(Of Agenda)
