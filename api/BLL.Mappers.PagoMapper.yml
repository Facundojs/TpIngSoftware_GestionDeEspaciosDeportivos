  assemblies:
  - BLL
  namespace: BLL.Mappers
  summary: Bidirectional mapper between payment and receipt domain entities and their DTO projections.
  remarks: >-
    Handles <xref href="Domain.Entities.Pago" data-throw-if-not-resolved="false"></xref> ↔ <xref href="BLL.DTOs.PagoDTO" data-throw-if-not-resolved="false"></xref> and <xref href="Domain.Entities.Comprobante" data-throw-if-not-resolved="false"></xref> ↔ <xref href="BLL.DTOs.ComprobanteDTO" data-throw-if-not-resolved="false"></xref>.

    <code>Estado</code> is stored as a string in the database and parsed to <xref href="Domain.Enums.EstadoPago" data-throw-if-not-resolved="false"></xref> on read.

    When mapping to entity, <xref href="Domain.Entities.Pago.Id" data-throw-if-not-resolved="false"></xref> is only set when the DTO's <xref href="BLL.DTOs.PagoDTO.Id" data-throw-if-not-resolved="false"></xref>

    is non-empty, allowing the database to assign the key on insert.
  example: []
  syntax:
    content: public static class PagoMapper
    content.vb: Public Module PagoMapper
