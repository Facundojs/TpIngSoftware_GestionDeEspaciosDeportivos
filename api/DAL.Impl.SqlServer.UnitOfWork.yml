  name: UnitOfWork
  nameWithType: UnitOfWork
  fullName: DAL.Impl.SqlServer.UnitOfWork
  type: Class
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/DAL/Impl/SqlServer/UnitOfWork.cs
  assemblies:
  - DAL
  namespace: DAL.Impl.SqlServer
  summary: >-
    Implements the Unit of Work pattern for SQL Server.

    Manages a single <xref href="System.Data.SqlClient.SqlConnection" data-throw-if-not-resolved="false"></xref> and <xref href="System.Data.SqlClient.SqlTransaction" data-throw-if-not-resolved="false"></xref> shared across

    all enrolled repositories for the duration of one logical operation.
  remarks: >-
    <p>

    Obtain an instance via <xref href="DAL.Factory.DalFactory.CreateUnitOfWork" data-throw-if-not-resolved="false"></xref>.

    Usage pattern:


    <pre><code class="lang-csharp">using (var uow = DalFactory.CreateUnitOfWork())

    {
        uow.BeginTransaction();
        // ...operations on uow.*Repository...
        uow.Commit();
    }</code></pre>

    </p>

    <p>

    After <xref href="DAL.Impl.SqlServer.UnitOfWork.Commit" data-throw-if-not-resolved="false"></xref> or <xref href="DAL.Impl.SqlServer.UnitOfWork.Rollback" data-throw-if-not-resolved="false"></xref>, the instance is <em>spent</em>

    and cannot be reused; <xref href="DAL.Impl.SqlServer.UnitOfWork.BeginTransaction" data-throw-if-not-resolved="false"></xref> will throw <xref href="System.ObjectDisposedException" data-throw-if-not-resolved="false"></xref>.

    <xref href="DAL.Impl.SqlServer.UnitOfWork.Dispose" data-throw-if-not-resolved="false"></xref> will roll back any uncommitted transaction if the <code>using</code> block

    exits without an explicit commit.

    </p>
  example: []
  syntax:
    content: 'public class UnitOfWork : IUnitOfWork, IDisposable'
    content.vb: Public Class UnitOfWork Implements IUnitOfWork, IDisposable
  inheritance:
  - System.Object
  implements:
