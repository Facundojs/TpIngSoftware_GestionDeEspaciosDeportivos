    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/DAL/Impl/SqlServer/BaseBusinessSqlRepository.cs
  assemblies:
  - DAL
  namespace: DAL.Impl
  summary: >-
    Base class for all business-domain SQL repositories.

    Extends <xref href="Service.Impl.BaseRepository" data-throw-if-not-resolved="false"></xref> with support for shared <xref href="System.Data.SqlClient.SqlConnection" data-throw-if-not-resolved="false"></xref>

    and <xref href="System.Data.SqlClient.SqlTransaction" data-throw-if-not-resolved="false"></xref> injection by <xref href="DAL.Impl.SqlServer.UnitOfWork" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    When <xref href="DAL.Impl.BaseBusinessSqlRepository.CurrentConnection" data-throw-if-not-resolved="false"></xref> is set (i.e., the repository is enrolled in a UoW

    transaction), the shadowed helper methods use the shared connection/transaction instead of

    opening a new one. When not enrolled, they fall back to the base class behaviour.
  example: []
  syntax:
    content: 'public class BaseBusinessSqlRepository : BaseRepository'
    content.vb: Public Class BaseBusinessSqlRepository Inherits BaseRepository
