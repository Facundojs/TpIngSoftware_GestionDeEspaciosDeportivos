  assemblies:
  - BLL
  namespace: BLL.DTOs
  summary: Indicates whether a client account is active or has been deactivated.
  remarks: >-
    Inactive clients are blocked from facility entry by <code>ClienteService.ValidarIngreso</code>

    and from creating new reservations. The status is persisted as an integer column.
