  namespace: Domain.Composite
  summary: Abstract base component of the Composite design pattern used to model the permission tree.
  remarks: >-
    A permission tree is composed of <xref href="Domain.Composite.Familia" data-throw-if-not-resolved="false"></xref> interior nodes and <xref href="Domain.Composite.Patente" data-throw-if-not-resolved="false"></xref>

    leaf nodes. All tree traversal and permission checks operate against the <xref href="Domain.Composite.Acceso" data-throw-if-not-resolved="false"></xref> abstraction,

    allowing uniform treatment of individual permissions and permission groups.
  example: []
  syntax:
    content: public abstract class Acceso
    content.vb: Public MustInherit Class Acceso
