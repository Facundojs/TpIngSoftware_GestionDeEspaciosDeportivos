- uid: BLL.BalanceService.CalcularSaldoMensual
  commentId: M:BLL.BalanceService.CalcularSaldoMensual
  id: CalcularSaldoMensual
  parent: BLL.BalanceService
  langs:
  - csharp
  - vb
  name: CalcularSaldoMensual()
  nameWithType: BalanceService.CalcularSaldoMensual()
  fullName: BLL.BalanceService.CalcularSaldoMensual()
  type: Method
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/BLL/BalanceService.cs
  assemblies:
  - BLL
  namespace: BLL
  summary: >-
    Iterates over all clients in parallel and inserts a <code>DeudaMembresia</code> movement for

    those whose <code>ProximaFechaPago</code> has passed. Advances <code>ProximaFechaPago</code> by

    the membership's <code>Regularidad</code> days after each charge.

    Clients without a membership, with an inactive or free membership, or whose next

    payment date is still in the future are skipped silently.
  example: []
  syntax:
    content: public void CalcularSaldoMensual()
    content.vb: Public Sub CalcularSaldoMensual()
  overload: BLL.BalanceService.CalcularSaldoMensual*
