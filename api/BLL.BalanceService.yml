  assemblies:
  - BLL
  namespace: BLL
  summary: >-
    Throws if the client's balance is negative, optionally prefixing the message with a context label.

    Used as a guard in operations that require the client to be current on payments.
  example: []
  syntax:
    content: public void ValidarDeuda(Guid clienteId, string contexto = null)
    parameters:
    - id: clienteId
      type: System.Guid
      description: The client to validate.
    - id: contexto
      type: System.String
      description: Optional operation name prepended to the error message for clarity.
    content.vb: Public Sub ValidarDeuda(clienteId As Guid, contexto As String = Nothing)
  overload: BLL.BalanceService.ValidarDeuda*
  exceptions:
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown when the client has an outstanding debt.
