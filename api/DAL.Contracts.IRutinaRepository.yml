  assemblies:
  - DAL
  namespace: DAL.Contracts
  summary: >-
    Closes a routine by setting its <code>Hasta</code> field to the current date-time.

    Called when creating a new routine for a client who already has one active.
  example: []
  syntax:
    content: void FinalizarRutina(Guid rutinaId)
    parameters:
    - id: rutinaId
      type: System.Guid
      description: The routine to finalize.
    content.vb: Sub FinalizarRutina(rutinaId As Guid)
  overload: DAL.Contracts.IRutinaRepository.FinalizarRutina*
