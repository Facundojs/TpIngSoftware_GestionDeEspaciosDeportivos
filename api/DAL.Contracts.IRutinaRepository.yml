  - vb
  name: GetActivaByCliente(Guid)
  nameWithType: IRutinaRepository.GetActivaByCliente(Guid)
  fullName: DAL.Contracts.IRutinaRepository.GetActivaByCliente(System.Guid)
  type: Method
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/DAL/Contracts/IRutinaRepository.cs
  assemblies:
  - DAL
  namespace: DAL.Contracts
  summary: >-
    Retrieves the currently active (open-ended) routine for a client.

    A routine is active when its <code>Hasta</code> field is <code>null</code>.
  example: []
  syntax:
    content: Rutina GetActivaByCliente(Guid clienteId)
    parameters:
    - id: clienteId
      type: System.Guid
      description: The client to look up.
    return:
      type: Domain.Entities.Rutina
      description: The active <xref href="Domain.Entities.Rutina" data-throw-if-not-resolved="false"></xref>, or <code>null</code> if the client has no active routine.
    content.vb: Function GetActivaByCliente(clienteId As Guid) As Rutina
  overload: DAL.Contracts.IRutinaRepository.GetActivaByCliente*
