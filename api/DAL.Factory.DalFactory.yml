    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/DAL/Factory/DalFactory.cs
  assemblies:
  - DAL
  namespace: DAL.Factory
  summary: Static service locator / factory for all repository singletons.
  remarks: >-
    <p>

    Each property follows a lazy-initialization pattern (<code>_field ?? (_field = new ImplClass())</code>),

    so repository instances are created on first access and reused thereafter within the process lifetime.

    </p>

    <p>

    For single-repository (read-only) operations, use the singleton properties directly.

    For multi-repository write operations that require atomicity, use

    <xref href="DAL.Factory.DalFactory.CreateUnitOfWork" data-throw-if-not-resolved="false"></xref> to obtain a fresh <xref href="DAL.Contracts.IUnitOfWork" data-throw-if-not-resolved="false"></xref> instance that

    shares one connection and transaction across all enrolled repositories.

    </p>
  example: []
  syntax:
    content: public static class DalFactory
    content.vb: Public Module DalFactory
