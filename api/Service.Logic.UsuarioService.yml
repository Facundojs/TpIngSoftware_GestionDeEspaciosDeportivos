  name: UsuarioService
  nameWithType: UsuarioService
  fullName: Service.Logic.UsuarioService
  type: Class
  assemblies:
  - Service
  namespace: Service.Logic
  summary: Manages user authentication, registration, profile updates, and password management.
  remarks: >-
    <p>

    Passwords are stored as SHA-256 hashes via <xref href="Service.Helpers.CryptographyHelper.HashPassword(System.String)" data-throw-if-not-resolved="false"></xref>.

    Every write operation recomputes <code>DigitoVerificador</code> (a SHA-256 hash of all scalar

    fields) to enable tamper-detection on the user record.

    </p>

    <p>

    Permission assignments are delegated to <xref href="Service.Contracts.IUsuarioRepository.UpdateAccesos(System.Guid%2cSystem.Collections.Generic.List%7bDomain.Composite.Acceso%7d)" data-throw-if-not-resolved="false"></xref>,

    which performs a delete-and-reinsert of the user's access tree.

    </p>
  example: []
  syntax:
    content: public class UsuarioService
    content.vb: Public Class UsuarioService
  inheritance:
