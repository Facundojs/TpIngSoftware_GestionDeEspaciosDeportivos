- uid: Service.Logic.UsuarioService.Login(System.String,System.String)
  commentId: M:Service.Logic.UsuarioService.Login(System.String,System.String)
  id: Login(System.String,System.String)
  parent: Service.Logic.UsuarioService
  langs:
  - csharp
  - vb
  name: Login(string, string)
  nameWithType: UsuarioService.Login(string, string)
  fullName: Service.Logic.UsuarioService.Login(string, string)
  type: Method
  assemblies:
  - Service
  namespace: Service.Logic
  summary: Authenticates a user by username and plaintext password.
  example: []
  syntax:
    content: public UsuarioDTO Login(string username, string password)
    parameters:
    - id: username
      type: System.String
      description: Username to look up.
    - id: password
      type: System.String
      description: Plaintext password; hashed internally before comparison.
    return:
      type: Service.DTO.UsuarioDTO
      description: >-
        A <xref href="Service.DTO.UsuarioDTO" data-throw-if-not-resolved="false"></xref> with the authenticated user's identity, permissions, and

        resolved <code>RolNegocio</code> (<code>"Administrador"</code>, <code>"Operador"</code>, or a

        comma-separated list of permission names).
    content.vb: Public Function Login(username As String, password As String) As UsuarioDTO
  overload: Service.Logic.UsuarioService.Login*
  exceptions:
  - type: System.Exception
    commentId: T:System.Exception
    description: Thrown with localized messages when the user is not found, the password is incorrect, or the account is blocked.
  nameWithType.vb: UsuarioService.Login(String, String)
  fullName.vb: Service.Logic.UsuarioService.Login(String, String)
  name.vb: Login(String, String)
