  type: Method
  assemblies:
  - Service
  namespace: Service.Logic
  summary: Retrieves paginated log entries, optionally filtered by date range, level, and message text.
  example: []
  syntax:
    content: public List<Log> GetLogs(int page, int pageSize, DateTime? from = null, DateTime? to = null, string logLevel = null, string message = null)
    parameters:
    - id: page
      type: System.Int32
      description: 1-based page number.
    - id: pageSize
      type: System.Int32
      description: Number of entries per page.
    - id: from
      type: System.Nullable{System.DateTime}
      description: Optional lower bound on the log entry timestamp.
    - id: to
      type: System.Nullable{System.DateTime}
      description: Optional upper bound on the log entry timestamp.
    - id: logLevel
      type: System.String
      description: Optional level filter (e.g., <code>"ERROR"</code>).
    - id: message
      type: System.String
      description: Optional substring filter applied to the message text.
    return:
      type: System.Collections.Generic.List{Domain.Log}
      description: A list of matching <xref href="Service.Logic.BitacoraService.Log(System.String%2cSystem.String%2cSystem.Exception)" data-throw-if-not-resolved="false"></xref> entries; empty list if the repository is unavailable.
    content.vb: Public Function GetLogs(page As Integer, pageSize As Integer, from As Date? = Nothing, [to] As Date? = Nothing, logLevel As String = Nothing, message As String = Nothing) As List(Of Log)
