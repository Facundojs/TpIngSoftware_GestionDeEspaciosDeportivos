  namespace: Service.Logic
  summary: Writes a log entry. Swallows any internal errors to avoid disrupting callers.
  example: []
  syntax:
    content: public void Log(string message, string level = "INFO", Exception ex = null)
    parameters:
    - id: message
      type: System.String
      description: The message to record.
    - id: level
      type: System.String
      description: 'Severity level: <code>"INFO"</code>, <code>"WARNING"</code>, or <code>"ERROR"</code>. Defaults to <code>"INFO"</code>.'
    - id: ex
      type: System.Exception
      description: Optional exception to attach when <code class="paramref">level</code> is <code>"ERROR"</code>.
    content.vb: Public Sub Log(message As String, level As String = "INFO", ex As Exception = Nothing)
