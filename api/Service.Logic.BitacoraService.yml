  name: BitacoraService
  nameWithType: BitacoraService
  fullName: Service.Logic.BitacoraService
  type: Class
  assemblies:
  - Service
  namespace: Service.Logic
  summary: >-
    Application-wide audit log service. All BLL operations that have user-visible side effects

    call this service to record INFO, WARNING, or ERROR entries.
  remarks: >-
    If the underlying <code>LogRepository</code> fails to initialize (e.g., database unavailable),

    the service falls back to <xref href="System.Console.WriteLine" data-throw-if-not-resolved="false"></xref> so that logging failures never

    propagate to callers.
