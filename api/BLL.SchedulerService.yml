  assemblies:
  - BLL
  namespace: BLL
  summary: Singleton background scheduler that periodically triggers <xref href="BLL.BalanceService.CalcularSaldoMensual" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    Uses a double-checked lock to prevent concurrent job executions. The job fires 5 seconds

    after <xref href="BLL.SchedulerService.Start" data-throw-if-not-resolved="false"></xref> is called, then repeats every hour.
