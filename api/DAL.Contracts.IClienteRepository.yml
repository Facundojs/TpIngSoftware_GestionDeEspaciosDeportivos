  assemblies:
  - DAL
  namespace: DAL.Contracts
  summary: >-
    Determines whether any active client is currently subscribed to the specified membership.

    Used to prevent disabling a membership that is still in use.
  example: []
  syntax:
    content: bool HasActiveClientsByMembresia(Guid membresiaId)
    parameters:
    - id: membresiaId
      type: System.Guid
      description: The membership to check.
    return:
      type: System.Boolean
      description: <code>true</code> if at least one active client holds this membership.
    content.vb: Function HasActiveClientsByMembresia(membresiaId As Guid) As Boolean
  overload: DAL.Contracts.IClienteRepository.HasActiveClientsByMembresia*
