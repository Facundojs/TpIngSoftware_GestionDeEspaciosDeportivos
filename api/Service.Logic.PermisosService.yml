- uid: Service.Logic.PermisosService.EnsurePermissions
  commentId: M:Service.Logic.PermisosService.EnsurePermissions
  id: EnsurePermissions
  parent: Service.Logic.PermisosService
  langs:
  - csharp
  - vb
  name: EnsurePermissions()
  nameWithType: PermisosService.EnsurePermissions()
  fullName: Service.Logic.PermisosService.EnsurePermissions()
  type: Method
  assemblies:
  - Service
  namespace: Service.Logic
  summary: >-
    Ensures all constants declared in <xref href="Domain.Composite.PermisoKeys" data-throw-if-not-resolved="false"></xref> exist as <xref href="Domain.Composite.Patente" data-throw-if-not-resolved="false"></xref>

    records in the database, and that the <code>"Administrador"</code> family holds all of them.
  remarks: >-
    Intended to run on application startup. Uses reflection to enumerate

    <xref href="Domain.Composite.PermisoKeys" data-throw-if-not-resolved="false"></xref> string constants and inserts any that are missing.

    The <code>Administrador</code> family is created if it does not exist.
  example: []
  syntax:
    content: public void EnsurePermissions()
    content.vb: Public Sub EnsurePermissions()
  overload: Service.Logic.PermisosService.EnsurePermissions*
