- uid: Service.Helpers.PermisoHelper.TienePermiso(Service.DTO.UsuarioDTO,System.String)
  commentId: M:Service.Helpers.PermisoHelper.TienePermiso(Service.DTO.UsuarioDTO,System.String)
  id: TienePermiso(Service.DTO.UsuarioDTO,System.String)
  isExtensionMethod: true
  parent: Service.Helpers.PermisoHelper
  langs:
  - csharp
  - vb
  name: TienePermiso(UsuarioDTO, string)
  nameWithType: PermisoHelper.TienePermiso(UsuarioDTO, string)
  fullName: Service.Helpers.PermisoHelper.TienePermiso(Service.DTO.UsuarioDTO, string)
  type: Method
  assemblies:
  - Service
  namespace: Service.Helpers
  summary: >-
    Determines whether <code class="paramref">user</code> holds the specified permission by

    recursively traversing their <xref href="Domain.Composite.Acceso" data-throw-if-not-resolved="false"></xref> composite tree.
  example: []
  syntax:
    content: public static bool TienePermiso(this UsuarioDTO user, string permiso)
    parameters:
    - id: user
      type: Service.DTO.UsuarioDTO
      description: The user whose permission tree will be searched.
    - id: permiso
      type: System.String
      description: >-
        The permission key to look for, matching a <xref href="Domain.Composite.Patente.TipoAcceso" data-throw-if-not-resolved="false"></xref> value

        (see <xref href="Domain.Composite.PermisoKeys" data-throw-if-not-resolved="false"></xref> for available constants).
    return:
      type: System.Boolean
      description: >-
        <code>true</code> if any <xref href="Domain.Composite.Patente" data-throw-if-not-resolved="false"></xref> leaf in the tree has

        <xref href="Domain.Composite.Patente.TipoAcceso" data-throw-if-not-resolved="false"></xref> equal to <code class="paramref">permiso</code>; otherwise <code>false</code>.
    content.vb: Public Shared Function TienePermiso(user As UsuarioDTO, permiso As String) As Boolean
