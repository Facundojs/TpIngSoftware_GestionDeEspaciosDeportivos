  assemblies:
  - BLL
  namespace: BLL.Mappers
  summary: Projects a <xref href="Domain.Entities.RutinaEjercicio" data-throw-if-not-resolved="false"></xref> scheduling record to an <xref href="BLL.DTOs.EjercicioDTO" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    When <code>entity.Ejercicio</code> is <code>null</code> (navigation property not loaded),

    <xref href="BLL.DTOs.EjercicioDTO.Nombre" data-throw-if-not-resolved="false"></xref> defaults to <code>"Desconocido"</code>.
  example: []
  syntax:
    content: public static EjercicioDTO ToDTO(RutinaEjercicio entity)
    parameters:
    - id: entity
      type: Domain.Entities.RutinaEjercicio
      description: Source scheduling record with <code>Ejercicio</code> navigation property loaded.
    return:
      type: BLL.DTOs.EjercicioDTO
    content.vb: Public Shared Function ToDTO(entity As RutinaEjercicio) As EjercicioDTO
