  langs:
  - csharp
  - vb
  name: EjercicioMapper
  nameWithType: EjercicioMapper
  fullName: BLL.Mappers.EjercicioMapper
  type: Class
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/BLL/Mappers/EjercicioMapper.cs
  assemblies:
  - BLL
  namespace: BLL.Mappers
  summary: Bidirectional mapper between exercise domain entities and <xref href="BLL.DTOs.EjercicioDTO" data-throw-if-not-resolved="false"></xref> projections.
  remarks: >-
    The domain model separates the exercise definition (<xref href="Domain.Entities.Ejercicio" data-throw-if-not-resolved="false"></xref>) from its

    scheduling within a routine (<xref href="Domain.Entities.RutinaEjercicio" data-throw-if-not-resolved="false"></xref>). <xref href="BLL.Mappers.EjercicioMapper.ToDTO(Domain.Entities.RutinaEjercicio)" data-throw-if-not-resolved="false"></xref> reads from

    <xref href="Domain.Entities.RutinaEjercicio" data-throw-if-not-resolved="false"></xref> (which contains repetitions, day, and order) and resolves the

    exercise name via the <code>Ejercicio</code> navigation property. <xref href="BLL.Mappers.EjercicioMapper.ToEntity(BLL.DTOs.EjercicioDTO)" data-throw-if-not-resolved="false"></xref> maps only to

    the base <xref href="Domain.Entities.Ejercicio" data-throw-if-not-resolved="false"></xref> definition (name/id); scheduling fields are persisted separately.
  example: []
  syntax:
    content: public static class EjercicioMapper
    content.vb: Public Module EjercicioMapper
