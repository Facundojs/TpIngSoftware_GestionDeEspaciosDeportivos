  summary: Projection of a <code>Cliente</code> entity used across all BLL service boundaries.
  remarks: >-
    Combines core identity fields with hydrated membership details and a pre-computed balance

    so that consumers (UI managers, API controllers) never need to issue additional queries.

    <xref href="BLL.DTOs.ClienteDTO.Status" data-throw-if-not-resolved="false"></xref> defaults to <xref href="BLL.DTOs.ClienteStatus.Activo" data-throw-if-not-resolved="false"></xref> on construction.
