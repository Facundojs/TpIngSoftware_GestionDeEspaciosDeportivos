  assemblies:
  - BLL
  namespace: BLL.DTOs
  summary: Command object carrying all inputs required to create a new reservation via <code>ReservaService.GenerarReserva</code>.
  remarks: >-
    <xref href="BLL.DTOs.GenerarReservaDTO.Duracion" data-throw-if-not-resolved="false"></xref> must be a positive integer representing minutes.

    <xref href="BLL.DTOs.GenerarReservaDTO.Adelanto" data-throw-if-not-resolved="false"></xref> is the partial payment collected at booking time; it may be zero but must not be negative.

    Availability is validated against the space's agenda and existing reservations inside the service.
