  assemblies:
  - BLL
  namespace: BLL.Services
  summary: Business logic service for client lifecycle management.
  remarks: >-
    Coordinates client registration, membership changes, status transitions, and facility check-in.

    Multi-step write operations are executed inside <xref href="DAL.Contracts.IUnitOfWork" data-throw-if-not-resolved="false"></xref> transactions.

    All operations are audited via <xref href="Service.Logic.BitacoraService" data-throw-if-not-resolved="false"></xref>.
