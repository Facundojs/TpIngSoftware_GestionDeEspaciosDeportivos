- uid: BLL.Services.ClienteService.RegistrarCliente(BLL.DTOs.ClienteDTO)
  commentId: M:BLL.Services.ClienteService.RegistrarCliente(BLL.DTOs.ClienteDTO)
  id: RegistrarCliente(BLL.DTOs.ClienteDTO)
  parent: BLL.Services.ClienteService
  langs:
  - csharp
  - vb
  name: RegistrarCliente(ClienteDTO)
  nameWithType: ClienteService.RegistrarCliente(ClienteDTO)
  fullName: BLL.Services.ClienteService.RegistrarCliente(BLL.DTOs.ClienteDTO)
  type: Method
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/BLL/Services/ClienteService.cs
  assemblies:
  - BLL
  namespace: BLL.Services
  summary: >-
    Registers a new client. If a membership is specified, creates the client-membership

    record and inserts an initial <code>DeudaMembresia</code> movement in the same transaction.
  example: []
  syntax:
    content: public void RegistrarCliente(ClienteDTO dto)
    parameters:
    - id: dto
      type: BLL.DTOs.ClienteDTO
      description: Client data including optional <xref href="BLL.DTOs.ClienteDTO.MembresiaID" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Sub RegistrarCliente(dto As ClienteDTO)
  overload: BLL.Services.ClienteService.RegistrarCliente*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: Thrown for invalid field values (DNI, name, email format, future birth date).
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown when the DNI is already registered or the membership is inactive.
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: Thrown for invalid field values.
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown if the DNI already exists or the membership is inactive.
- uid: BLL.Services.ClienteService.ActualizarMembresia(System.Guid,System.Guid)
  commentId: M:BLL.Services.ClienteService.ActualizarMembresia(System.Guid,System.Guid)
  id: ActualizarMembresia(System.Guid,System.Guid)
  parent: BLL.Services.ClienteService
  langs:
  - csharp
  - vb
  name: ActualizarMembresia(Guid, Guid)
  nameWithType: ClienteService.ActualizarMembresia(Guid, Guid)
  fullName: BLL.Services.ClienteService.ActualizarMembresia(System.Guid, System.Guid)
  type: Method
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/BLL/Services/ClienteService.cs
  assemblies:
  - BLL
  namespace: BLL.Services
  summary: >-
    Switches a client's active membership to a new plan within a transaction.

    Closes the current <code>ClienteMembresia</code> record, creates a new one, and inserts

    a <code>DeudaMembresia</code> movement for the new plan's price.
  example: []
  syntax:
    content: public void ActualizarMembresia(Guid clienteId, Guid nuevaMembresiaId)
    parameters:
    - id: clienteId
      type: System.Guid
      description: The client to update.
    - id: nuevaMembresiaId
      type: System.Guid
      description: The new membership plan to assign.
    content.vb: Public Sub ActualizarMembresia(clienteId As Guid, nuevaMembresiaId As Guid)
  overload: BLL.Services.ClienteService.ActualizarMembresia*
  exceptions:
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown when the client has an outstanding negative balance.
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown if the client has a negative balance, or the membership is inactive.
