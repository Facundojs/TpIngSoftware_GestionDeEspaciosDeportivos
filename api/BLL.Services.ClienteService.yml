- uid: BLL.Services.ClienteService.ValidarIngreso(System.Int32)
  commentId: M:BLL.Services.ClienteService.ValidarIngreso(System.Int32)
  id: ValidarIngreso(System.Int32)
  parent: BLL.Services.ClienteService
  langs:
  - csharp
  - vb
  name: ValidarIngreso(int)
  nameWithType: ClienteService.ValidarIngreso(int)
  fullName: BLL.Services.ClienteService.ValidarIngreso(int)
  type: Method
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/BLL/Services/ClienteService.cs
  assemblies:
  - BLL
  namespace: BLL.Services
  summary: >-
    Validates whether a client may enter the facility and, if so, records the check-in.

    Access is denied when the client is inactive or has a negative balance.
  example: []
  syntax:
    content: public ResultadoIngresoDTO ValidarIngreso(int dni)
    parameters:
    - id: dni
      type: System.Int32
      description: The client's DNI to look up.
    return:
      type: BLL.DTOs.ResultadoIngresoDTO
      description: >-
        A <xref href="BLL.DTOs.ResultadoIngresoDTO" data-throw-if-not-resolved="false"></xref> with <code>Permitido = true</code> on success, or

        <code>Permitido = false</code> with a reason string when access is denied.
    content.vb: Public Function ValidarIngreso(dni As Integer) As ResultadoIngresoDTO
  overload: BLL.Services.ClienteService.ValidarIngreso*
  nameWithType.vb: ClienteService.ValidarIngreso(Integer)
  fullName.vb: BLL.Services.ClienteService.ValidarIngreso(Integer)
  name.vb: ValidarIngreso(Integer)
