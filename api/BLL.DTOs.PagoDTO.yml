  assemblies:
  - BLL
  namespace: BLL.DTOs
  summary: Projection of a <code>Pago</code> entity used as both input and output for payment operations.
  remarks: >-
    When used as input to <code>PagoService.RegistrarPago</code>, set <xref href="BLL.DTOs.PagoDTO.ClienteID" data-throw-if-not-resolved="false"></xref>,

    <xref href="BLL.DTOs.PagoDTO.Monto" data-throw-if-not-resolved="false"></xref>, <xref href="BLL.DTOs.PagoDTO.Metodo" data-throw-if-not-resolved="false"></xref>, and optionally <xref href="BLL.DTOs.PagoDTO.ReservaID" data-throw-if-not-resolved="false"></xref> or

    <xref href="BLL.DTOs.PagoDTO.MembresiaID" data-throw-if-not-resolved="false"></xref> to indicate the payment type.

    <xref href="BLL.DTOs.PagoDTO.Estado" data-throw-if-not-resolved="false"></xref> is overwritten by the service; callers should not set it.

    <xref href="BLL.DTOs.PagoDTO.Id" data-throw-if-not-resolved="false"></xref> is initialized to a new <xref href="System.Guid" data-throw-if-not-resolved="false"></xref> on construction.
