    content: public void ActualizarMembresia(MembresiaDTO dto)
    parameters:
    - id: dto
      type: BLL.DTOs.MembresiaDTO
      description: Updated membership data. <xref href="BLL.DTOs.MembresiaDTO.Id" data-throw-if-not-resolved="false"></xref> must identify an existing record.
