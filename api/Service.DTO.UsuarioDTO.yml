    UI components use <xref href="Service.Helpers.PermisoHelper.TienePermiso(Service.DTO.UsuarioDTO%2cSystem.String)" data-throw-if-not-resolved="false"></xref> on this DTO to

    drive button visibility and access control without hitting the database again.
