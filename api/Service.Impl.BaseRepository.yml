- uid: Service.Impl.BaseRepository.ExecuteReader``1(System.String,System.Data.SqlClient.SqlParameter[],System.Func{System.Data.SqlClient.SqlDataReader,``0})
  commentId: M:Service.Impl.BaseRepository.ExecuteReader``1(System.String,System.Data.SqlClient.SqlParameter[],System.Func{System.Data.SqlClient.SqlDataReader,``0})
  id: ExecuteReader``1(System.String,System.Data.SqlClient.SqlParameter[],System.Func{System.Data.SqlClient.SqlDataReader,``0})
  parent: Service.Impl.BaseRepository
  langs:
  - csharp
  - vb
  name: ExecuteReader<T>(string, SqlParameter[], Func<SqlDataReader, T>)
  nameWithType: BaseRepository.ExecuteReader<T>(string, SqlParameter[], Func<SqlDataReader, T>)
  fullName: Service.Impl.BaseRepository.ExecuteReader<T>(string, System.Data.SqlClient.SqlParameter[], System.Func<System.Data.SqlClient.SqlDataReader, T>)
  type: Method
  assemblies:
  - Service
  namespace: Service.Impl
  summary: >-
    Executes a SELECT query and projects the result via a mapping delegate.

    Always opens a new connection; use <code>BaseBusinessSqlRepository</code> overload for UoW reads.
  example: []
  syntax:
    content: protected T ExecuteReader<T>(string query, SqlParameter[] parameters, Func<SqlDataReader, T> map)
    parameters:
    - id: query
      type: System.String
      description: Parameterized SQL SELECT statement.
    - id: parameters
      type: System.Data.SqlClient.SqlParameter[]
      description: SQL parameters to bind, or <code>null</code> for none.
    - id: map
      type: System.Func{System.Data.SqlClient.SqlDataReader,{T}}
      description: Delegate that receives the open <xref href="System.Data.SqlClient.SqlDataReader" data-throw-if-not-resolved="false"></xref> and returns <code class="typeparamref">T</code>.
    typeParameters:
    - id: T
      description: The projection type returned by <code class="paramref">map</code>.
    return:
      type: '{T}'
      description: The value produced by <code class="paramref">map</code>.
    content.vb: Protected Function ExecuteReader(Of T)(query As String, parameters As SqlParameter(), map As Func(Of SqlDataReader, T)) As T
  overload: Service.Impl.BaseRepository.ExecuteReader*
  nameWithType.vb: BaseRepository.ExecuteReader(Of T)(String, SqlParameter(), Func(Of SqlDataReader, T))
  fullName.vb: Service.Impl.BaseRepository.ExecuteReader(Of T)(String, System.Data.SqlClient.SqlParameter(), System.Func(Of System.Data.SqlClient.SqlDataReader, T))
  name.vb: ExecuteReader(Of T)(String, SqlParameter(), Func(Of SqlDataReader, T))
