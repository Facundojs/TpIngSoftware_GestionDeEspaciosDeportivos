  parent: Service.Impl.BaseRepository
  langs:
  - csharp
  - vb
  name: ExecuteNonQuery(string, SqlParameter[], SqlConnection, SqlTransaction)
  nameWithType: BaseRepository.ExecuteNonQuery(string, SqlParameter[], SqlConnection, SqlTransaction)
  fullName: Service.Impl.BaseRepository.ExecuteNonQuery(string, System.Data.SqlClient.SqlParameter[], System.Data.SqlClient.SqlConnection, System.Data.SqlClient.SqlTransaction)
  type: Method
  assemblies:
  - Service
  namespace: Service.Impl
  summary: Executes a non-query SQL statement (INSERT, UPDATE, DELETE).
  example: []
  syntax:
    content: protected void ExecuteNonQuery(string query, SqlParameter[] parameters, SqlConnection conn = null, SqlTransaction tran = null)
    parameters:
    - id: query
      type: System.String
      description: Parameterized SQL statement.
    - id: parameters
      type: System.Data.SqlClient.SqlParameter[]
      description: SQL parameters to bind, or <code>null</code> for none.
    - id: conn
      type: System.Data.SqlClient.SqlConnection
      description: >-
        Optional shared connection. When provided, the command runs on this connection

        using <code class="paramref">tran</code> (if any), without opening a new connection.
    - id: tran
      type: System.Data.SqlClient.SqlTransaction
      description: Optional transaction to enlist the command in.
    content.vb: Protected Sub ExecuteNonQuery(query As String, parameters As SqlParameter(), conn As SqlConnection = Nothing, tran As SqlTransaction = Nothing)
