  summary: Abstract base class for all SQL Server repositories, providing low-level ADO.NET helpers.
  remarks: >-
    Each helper opens its own <xref href="System.Data.SqlClient.SqlConnection" data-throw-if-not-resolved="false"></xref> unless a shared <code class="paramref">conn</code>

    is injected (used by <code>DAL.Impl.BaseBusinessSqlRepository</code> when enrolled in a

    DAL.Impl.SqlServer.UnitOfWork transaction).
  example: []
  syntax:
    content: public abstract class BaseRepository
    content.vb: Public MustInherit Class BaseRepository
