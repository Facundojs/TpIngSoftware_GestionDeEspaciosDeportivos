  assemblies:
  - BLL
  namespace: BLL.DTOs
  summary: Projection of a facility check-in (<code>Ingreso</code>) record with a hydrated client name.
  remarks: >-
    Check-in records are written by <code>ClienteService.ValidarIngreso</code> and are read-only

    through <code>IngresoService</code>. <xref href="BLL.DTOs.IngresoDTO.ClienteNombre" data-throw-if-not-resolved="false"></xref> is hydrated at query time;

    it is set to <code>"Desconocido"</code> when the client record cannot be resolved.
