  name: IUnitOfWork
  nameWithType: IUnitOfWork
  fullName: DAL.Contracts.IUnitOfWork
  type: Interface
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/DAL/Contracts/IUnitOfWork.cs
  assemblies:
  - DAL
  namespace: DAL.Contracts
  summary: Defines a transactional scope that shares a single database connection across multiple repositories.
  remarks: >-
    <p>

    Obtain a new instance from <xref href="DAL.Factory.DalFactory.CreateUnitOfWork" data-throw-if-not-resolved="false"></xref>.

    The intended usage pattern is:


    <pre><code class="lang-csharp">using (var uow = DalFactory.CreateUnitOfWork())

    {
        uow.BeginTransaction();
        // use uow.*Repository to perform coordinated writes
        uow.Commit();
    }</code></pre>

    </p>

    <p>

    If <xref href="DAL.Contracts.IUnitOfWork.Commit" data-throw-if-not-resolved="false"></xref> is never called, <xref href="System.IDisposable.Dispose" data-throw-if-not-resolved="false"></xref> will automatically

    roll back any open transaction when the <code>using</code> block exits.

    </p>
  example: []
  syntax:
    content: 'public interface IUnitOfWork : IDisposable'
    content.vb: Public Interface IUnitOfWork Inherits IDisposable
  derivedClasses:
  - DAL.Impl.SqlServer.UnitOfWork
  inheritedMembers:
  - System.IDisposable.Dispose
