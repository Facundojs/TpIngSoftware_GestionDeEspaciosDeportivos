  fullName: DAL.Contracts.IPagoRepository.GetByCliente(System.Guid, System.DateTime?, System.DateTime?)
  type: Method
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/DAL/Contracts/IPagoRepository.cs
  assemblies:
  - DAL
  namespace: DAL.Contracts
  summary: Retrieves payments for a client, optionally filtered by a date range.
  example: []
  syntax:
    content: List<Pago> GetByCliente(Guid clienteId, DateTime? desde, DateTime? hasta)
    parameters:
    - id: clienteId
      type: System.Guid
      description: The client whose payments to fetch.
    - id: desde
      type: System.Nullable{System.DateTime}
      description: Optional inclusive lower bound on payment date.
    - id: hasta
      type: System.Nullable{System.DateTime}
      description: Optional inclusive upper bound on payment date.
    return:
      type: System.Collections.Generic.List{Domain.Entities.Pago}
      description: List of matching payments; empty list if none.
    content.vb: Function GetByCliente(clienteId As Guid, desde As Date?, hasta As Date?) As List(Of Pago)
