  type: Class
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/BLL/Mappers/ClienteMapper.cs
  assemblies:
  - BLL
  namespace: BLL.Mappers
  summary: Bidirectional mapper between <xref href="Domain.Entities.Cliente" data-throw-if-not-resolved="false"></xref> domain entities and <xref href="BLL.DTOs.ClienteDTO" data-throw-if-not-resolved="false"></xref> projections.
  remarks: >-
    <xref href="BLL.Mappers.ClienteMapper.ToDTO(Domain.Entities.Cliente%2cDomain.Entities.Membresia%2cDomain.Entities.Balance%2cSystem.Nullable%7bSystem.DateTime%7d)" data-throw-if-not-resolved="false"></xref> accepts an optional <code>Balance</code> and <code>proximaFechaPago</code> so the caller

    can hydrate the DTO in a single pass without additional round-trips. When <code class="paramref">balance</code>

    is <code>null</code>, <xref href="BLL.DTOs.ClienteDTO.Balance" data-throw-if-not-resolved="false"></xref> defaults to zero and

    <xref href="BLL.DTOs.ClienteDTO.EstadoBalance" data-throw-if-not-resolved="false"></xref> is set to <xref href="BLL.DTOs.EstadoBalance.AlDia" data-throw-if-not-resolved="false"></xref>.

    Unrecognized <code>Estado</code> string values are coerced to <xref href="BLL.DTOs.ClienteStatus.Activo" data-throw-if-not-resolved="false"></xref>

    and logged as warnings.
  example: []
  syntax:
    content: public static class ClienteMapper
    content.vb: Public Module ClienteMapper
