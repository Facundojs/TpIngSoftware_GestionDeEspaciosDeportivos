- uid: BLL.Mappers.ClienteMapper.ToDTO(Domain.Entities.Cliente,Domain.Entities.Membresia,Domain.Entities.Balance,System.Nullable{System.DateTime})
  commentId: M:BLL.Mappers.ClienteMapper.ToDTO(Domain.Entities.Cliente,Domain.Entities.Membresia,Domain.Entities.Balance,System.Nullable{System.DateTime})
  id: ToDTO(Domain.Entities.Cliente,Domain.Entities.Membresia,Domain.Entities.Balance,System.Nullable{System.DateTime})
  parent: BLL.Mappers.ClienteMapper
  langs:
  - csharp
  - vb
  name: ToDTO(Cliente, Membresia, Balance, DateTime?)
  nameWithType: ClienteMapper.ToDTO(Cliente, Membresia, Balance, DateTime?)
  fullName: BLL.Mappers.ClienteMapper.ToDTO(Domain.Entities.Cliente, Domain.Entities.Membresia, Domain.Entities.Balance, System.DateTime?)
  type: Method
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/BLL/Mappers/ClienteMapper.cs
  assemblies:
  - BLL
  namespace: BLL.Mappers
  summary: Projects a <xref href="Domain.Entities.Cliente" data-throw-if-not-resolved="false"></xref> entity to a <xref href="BLL.DTOs.ClienteDTO" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public static ClienteDTO ToDTO(Cliente entity, Membresia membresia, Balance balance, DateTime? proximaFechaPago = null)
    parameters:
    - id: entity
      type: Domain.Entities.Cliente
      description: Source entity. Returns <code>null</code> when <code>null</code>.
    - id: membresia
      type: Domain.Entities.Membresia
      description: Membership entity to embed as <xref href="BLL.DTOs.ClienteDTO.MembresiaDetalle" data-throw-if-not-resolved="false"></xref>, or <code>null</code>.
    - id: balance
      type: Domain.Entities.Balance
      description: Current balance record used to populate <xref href="BLL.DTOs.ClienteDTO.Balance" data-throw-if-not-resolved="false"></xref> and <xref href="BLL.DTOs.ClienteDTO.EstadoBalance" data-throw-if-not-resolved="false"></xref>.
    - id: proximaFechaPago
      type: System.Nullable{System.DateTime}
      description: Next billing date from the active <code>ClienteMembresia</code> row, or <code>null</code>.
    return:
      type: BLL.DTOs.ClienteDTO
    content.vb: Public Shared Function ToDTO(entity As Cliente, membresia As Membresia, balance As Balance, proximaFechaPago As Date? = Nothing) As ClienteDTO
  overload: BLL.Mappers.ClienteMapper.ToDTO*
