  remarks: Computed and hydrated properties (<xref href="BLL.DTOs.ClienteDTO.Balance" data-throw-if-not-resolved="false"></xref>, <xref href="BLL.DTOs.ClienteDTO.MembresiaDetalle" data-throw-if-not-resolved="false"></xref>, etc.) are not mapped.
