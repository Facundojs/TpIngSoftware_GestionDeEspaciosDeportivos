- uid: Service.Contracts.IUsuarioRepository.UpdateAccesos(System.Guid,System.Collections.Generic.List{Domain.Composite.Acceso})
  commentId: M:Service.Contracts.IUsuarioRepository.UpdateAccesos(System.Guid,System.Collections.Generic.List{Domain.Composite.Acceso})
  id: UpdateAccesos(System.Guid,System.Collections.Generic.List{Domain.Composite.Acceso})
  parent: Service.Contracts.IUsuarioRepository
  langs:
  - csharp
  - vb
  name: UpdateAccesos(Guid, List<Acceso>)
  nameWithType: IUsuarioRepository.UpdateAccesos(Guid, List<Acceso>)
  fullName: Service.Contracts.IUsuarioRepository.UpdateAccesos(System.Guid, System.Collections.Generic.List<Domain.Composite.Acceso>)
  type: Method
  assemblies:
  - Service
  namespace: Service.Contracts
  summary: >-
    Replaces the full set of <xref href="Domain.Composite.Acceso" data-throw-if-not-resolved="false"></xref> nodes assigned to a user.

    The existing permission associations are deleted and re-inserted atomically.
  example: []
  syntax:
    content: void UpdateAccesos(Guid idUsuario, List<Acceso> accesos)
    parameters:
    - id: idUsuario
      type: System.Guid
      description: The user whose permissions will be replaced.
    - id: accesos
      type: System.Collections.Generic.List{Domain.Composite.Acceso}
      description: New list of <xref href="Domain.Composite.Acceso" data-throw-if-not-resolved="false"></xref> roots to assign.
    content.vb: Sub UpdateAccesos(idUsuario As Guid, accesos As List(Of Acceso))
  overload: Service.Contracts.IUsuarioRepository.UpdateAccesos*
  nameWithType.vb: IUsuarioRepository.UpdateAccesos(Guid, List(Of Acceso))
