  fullName: Service.Contracts.IUsuarioRepository.GetFamiliasByUsuarioId(System.Guid)
  type: Method
  assemblies:
  - Service
  namespace: Service.Contracts
  summary: >-
    Retrieves the top-level <xref href="Domain.Composite.Familia" data-throw-if-not-resolved="false"></xref> nodes assigned to a user.

    Each family is fully hydrated (recursive children loaded).
  example: []
  syntax:
    content: List<Familia> GetFamiliasByUsuarioId(Guid usuarioId)
    parameters:
    - id: usuarioId
      type: System.Guid
      description: The user to look up.
    return:
      type: System.Collections.Generic.List{Domain.Composite.Familia}
      description: List of assigned families; empty list if none.
    content.vb: Function GetFamiliasByUsuarioId(usuarioId As Guid) As List(Of Familia)
  overload: Service.Contracts.IUsuarioRepository.GetFamiliasByUsuarioId*
