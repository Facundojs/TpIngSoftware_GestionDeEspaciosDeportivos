  assemblies:
  - BLL
  namespace: BLL.DTOs
  summary: Transfer object representing a receipt (comprobante) file attached to a payment or reservation.
  remarks: >-
    Either <xref href="BLL.DTOs.ComprobanteDTO.PagoID" data-throw-if-not-resolved="false"></xref> or <xref href="BLL.DTOs.ComprobanteDTO.ReservaID" data-throw-if-not-resolved="false"></xref> must be set to identify the owning entity.

    <xref href="BLL.DTOs.ComprobanteDTO.Contenido" data-throw-if-not-resolved="false"></xref> holds the raw file bytes (typically an HTML receipt generated by

    <code>ComprobanteGenerator</code>). <xref href="BLL.DTOs.ComprobanteDTO.RutaArchivo" data-throw-if-not-resolved="false"></xref> is an optional filesystem path used

    when the file is persisted to disk rather than stored as a BLOB.

    <xref href="BLL.DTOs.ComprobanteDTO.Id" data-throw-if-not-resolved="false"></xref> is auto-assigned on construction.
  example: []
  syntax:
    content: public class ComprobanteDTO
    content.vb: Public Class ComprobanteDTO
