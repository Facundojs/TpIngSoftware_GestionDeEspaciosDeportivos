- uid: DAL.Contracts.IReservaRepository.EspacioDisponible(System.Guid,System.DateTime,System.Int32)
  commentId: M:DAL.Contracts.IReservaRepository.EspacioDisponible(System.Guid,System.DateTime,System.Int32)
  id: EspacioDisponible(System.Guid,System.DateTime,System.Int32)
