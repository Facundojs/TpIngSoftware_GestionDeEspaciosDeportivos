  langs:
  - csharp
  - vb
  name: EspacioDisponible(Guid, DateTime, int)
  nameWithType: IReservaRepository.EspacioDisponible(Guid, DateTime, int)
  fullName: DAL.Contracts.IReservaRepository.EspacioDisponible(System.Guid, System.DateTime, int)
  type: Method
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/DAL/Contracts/IReservaRepository.cs
  assemblies:
  - DAL
  namespace: DAL.Contracts
  summary: >-
    Checks whether a space is available for a reservation starting at <code class="paramref">fechaHora</code>

    for <code class="paramref">duracion</code> minutes.
  example: []
  syntax:
    content: bool EspacioDisponible(Guid espacioId, DateTime fechaHora, int duracion)
    parameters:
    - id: espacioId
      type: System.Guid
      description: The space to check.
    - id: fechaHora
      type: System.DateTime
      description: Proposed start date and time.
    - id: duracion
      type: System.Int32
      description: Duration in minutes.
    return:
      type: System.Boolean
      description: <code>true</code> if no conflicting active reservation exists; otherwise <code>false</code>.
    content.vb: Function EspacioDisponible(espacioId As Guid, fechaHora As Date, duracion As Integer) As Boolean
  overload: DAL.Contracts.IReservaRepository.EspacioDisponible*
  nameWithType.vb: IReservaRepository.EspacioDisponible(Guid, Date, Integer)
  fullName.vb: DAL.Contracts.IReservaRepository.EspacioDisponible(System.Guid, Date, Integer)
  name.vb: EspacioDisponible(Guid, Date, Integer)
