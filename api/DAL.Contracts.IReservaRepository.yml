  assemblies:
  - DAL
  namespace: DAL.Contracts
  summary: Retrieves all reservations for a given space within a date-time range.
  example: []
  syntax:
    content: List<Reserva> GetByEspacio(Guid espacioId, DateTime desde, DateTime hasta)
    parameters:
    - id: espacioId
      type: System.Guid
      description: The space to filter by.
    - id: desde
      type: System.DateTime
      description: Inclusive lower bound of the date range.
    - id: hasta
      type: System.DateTime
      description: Inclusive upper bound of the date range.
    return:
      type: System.Collections.Generic.List{Domain.Entities.Reserva}
      description: List of matching reservations; empty list if none.
    content.vb: Function GetByEspacio(espacioId As Guid, desde As Date, hasta As Date) As List(Of Reserva)
