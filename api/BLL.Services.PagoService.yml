- uid: BLL.Services.PagoService.RegistrarPago(BLL.DTOs.PagoDTO)
  commentId: M:BLL.Services.PagoService.RegistrarPago(BLL.DTOs.PagoDTO)
  id: RegistrarPago(BLL.DTOs.PagoDTO)
  parent: BLL.Services.PagoService
  langs:
  - csharp
  - vb
  name: RegistrarPago(PagoDTO)
  nameWithType: PagoService.RegistrarPago(PagoDTO)
  fullName: BLL.Services.PagoService.RegistrarPago(BLL.DTOs.PagoDTO)
  type: Method
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/BLL/Services/PagoService.cs
  assemblies:
  - BLL
  namespace: BLL.Services
  summary: >-
    Registers a payment, updates the corresponding membership next-payment date (if applicable),

    auto-transitions the reservation to <code>Pagada</code> when fully settled, and generates a receipt.
  example: []
  syntax:
    content: public void RegistrarPago(PagoDTO dto)
    parameters:
    - id: dto
      type: BLL.DTOs.PagoDTO
      description: Payment data. <xref href="BLL.DTOs.PagoDTO.Monto" data-throw-if-not-resolved="false"></xref> must be positive.
    content.vb: Public Sub RegistrarPago(dto As PagoDTO)
  overload: BLL.Services.PagoService.RegistrarPago*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: Thrown for invalid amount or missing payment method.
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown with code <code>"ERR_MONTO_SUPERA_SALDO"</code> when the payment amount exceeds the reservation's outstanding balance.
