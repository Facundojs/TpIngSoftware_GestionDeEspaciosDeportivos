  assemblies:
  - BLL
  namespace: BLL.Services
  summary: Business logic service for payment registration, refunds, and receipt management.
  remarks: >-
    <p>

    All write operations run inside <xref href="DAL.Contracts.IUnitOfWork" data-throw-if-not-resolved="false"></xref> transactions.

    Receipt (comprobante) generation is non-fatal: failures are logged but do not abort the payment.

    </p>

    <p>

    Payment types are determined by the presence of <xref href="BLL.DTOs.PagoDTO.MembresiaID" data-throw-if-not-resolved="false"></xref> or

    <xref href="BLL.DTOs.PagoDTO.ReservaID" data-throw-if-not-resolved="false"></xref>; otherwise the payment is treated as a generic account credit.

    </p>
  example: []
  syntax:
    content: public class PagoService
    content.vb: Public Class PagoService
