  name: PermisoKeys
  nameWithType: PermisoKeys
  fullName: Domain.Composite.PermisoKeys
  type: Class
  assemblies:
  - Domain
  namespace: Domain.Composite
  summary: Defines the canonical string keys for every permission in the system.
  remarks: >-
    Each constant maps to the <xref href="Domain.Composite.Patente.TipoAcceso" data-throw-if-not-resolved="false"></xref> value stored in the database and

    is the single source of truth for authorization checks performed by

    Service.Helpers.PermisoHelper.TienePermiso.

    Service.Logic.PermisosService.EnsurePermissions uses reflection over this class

    to auto-provision any missing <xref href="Domain.Composite.Patente" data-throw-if-not-resolved="false"></xref> records on startup.
  example: []
