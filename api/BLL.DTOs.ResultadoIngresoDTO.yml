  assemblies:
  - BLL
  namespace: BLL.DTOs
  summary: >-
    Result returned by <code>ClienteService.ValidarIngreso</code> describing whether a client is

    permitted to enter the facility and the reason when access is denied.
  remarks: >-
    When <xref href="BLL.DTOs.ResultadoIngresoDTO.Permitido" data-throw-if-not-resolved="false"></xref> is <code>false</code>, <xref href="BLL.DTOs.ResultadoIngresoDTO.Razon" data-throw-if-not-resolved="false"></xref> contains a localized

    message suitable for display (e.g., client inactive, outstanding debt).

    <xref href="BLL.DTOs.ResultadoIngresoDTO.Balance" data-throw-if-not-resolved="false"></xref> is always populated so the UI can show the client's account state

    regardless of the access decision.
