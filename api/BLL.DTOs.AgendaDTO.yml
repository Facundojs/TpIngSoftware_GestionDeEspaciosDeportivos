  assemblies:
  - BLL
  namespace: BLL.DTOs
  summary: Represents a single availability window for a facility space on a given day of the week.
  remarks: >-
    Used as the input/output model for <code>AgendaService.ConfigurarAgenda</code>.

    A space may have multiple <xref href="BLL.DTOs.AgendaDTO" data-throw-if-not-resolved="false"></xref> entries per day to model split availability windows.

    <xref href="BLL.DTOs.AgendaDTO.DiaSemana" data-throw-if-not-resolved="false"></xref> follows the <code>DayOfWeek</code> convention: 0 = Sunday … 6 = Saturday.

    Note: windows that cross midnight (i.e., <xref href="BLL.DTOs.AgendaDTO.HoraHasta" data-throw-if-not-resolved="false"></xref> &lt; <xref href="BLL.DTOs.AgendaDTO.HoraDesde" data-throw-if-not-resolved="false"></xref>) are

    not currently supported and will be rejected by the service.
  example: []
  syntax:
    content: public class AgendaDTO
    content.vb: Public Class AgendaDTO
