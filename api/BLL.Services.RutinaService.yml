- uid: BLL.Services.RutinaService.CrearRutina(BLL.DTOs.RutinaDTO)
  commentId: M:BLL.Services.RutinaService.CrearRutina(BLL.DTOs.RutinaDTO)
  id: CrearRutina(BLL.DTOs.RutinaDTO)
  parent: BLL.Services.RutinaService
  langs:
  - csharp
  - vb
  name: CrearRutina(RutinaDTO)
  nameWithType: RutinaService.CrearRutina(RutinaDTO)
  fullName: BLL.Services.RutinaService.CrearRutina(BLL.DTOs.RutinaDTO)
  type: Method
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/BLL/Services/RutinaService.cs
  assemblies:
  - BLL
  namespace: BLL.Services
  summary: >-
    Creates a new routine for a client. If an active routine exists it is finalized first.

    Exercises not found in the catalog are auto-created.
  example: []
  syntax:
    content: public void CrearRutina(RutinaDTO dto)
    parameters:
    - id: dto
      type: BLL.DTOs.RutinaDTO
      description: >-
        Routine data including a non-empty exercise list.

        Each exercise must have positive repetitions and a valid day (1–7).
    content.vb: Public Sub CrearRutina(dto As RutinaDTO)
  overload: BLL.Services.RutinaService.CrearRutina*
  exceptions:
  - type: System.Exception
    commentId: T:System.Exception
    description: Thrown for an empty exercise list, zero/negative repetitions, or out-of-range day values.
  - type: System.Exception
    commentId: T:System.Exception
    description: Thrown if the exercise list is empty, reps are zero, or day of week is out of range.
