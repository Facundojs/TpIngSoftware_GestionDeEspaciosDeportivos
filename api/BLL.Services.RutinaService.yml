  assemblies:
  - BLL
  namespace: BLL.Services
  summary: >-
    Replaces the exercise set of an existing routine within a transaction

    (clears all existing routine-exercise links, then re-inserts the new set).
  example: []
  syntax:
    content: public void ModificarRutina(Guid rutinaId, List<EjercicioDTO> ejercicios)
    parameters:
    - id: rutinaId
      type: System.Guid
      description: The routine to modify.
    - id: ejercicios
      type: System.Collections.Generic.List{BLL.DTOs.EjercicioDTO}
      description: Non-empty replacement exercise list.
    content.vb: Public Sub ModificarRutina(rutinaId As Guid, ejercicios As List(Of EjercicioDTO))
