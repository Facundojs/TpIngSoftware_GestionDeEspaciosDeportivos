  namespace: Service.Helpers
  summary: Provides strongly-typed access to named connection strings defined in <code>App.config</code>.
  remarks: >-
    Two connection strings are expected:


    <ul><li><xref href="Service.Helpers.ConnectionManager.BaseConnectionName" data-throw-if-not-resolved="false"></xref> — used for system/infrastructure repositories (users, logs, permissions).</li><li><xref href="Service.Helpers.ConnectionManager.BusinessConnectionName" data-throw-if-not-resolved="false"></xref> — used for all business-domain repositories and transactional UoW operations.</li></ul>
