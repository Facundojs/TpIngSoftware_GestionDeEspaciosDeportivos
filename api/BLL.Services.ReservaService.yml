  langs:
  - csharp
  - vb
  name: VerificarDisponibilidad(Guid, DateTime, int)
  nameWithType: ReservaService.VerificarDisponibilidad(Guid, DateTime, int)
  fullName: BLL.Services.ReservaService.VerificarDisponibilidad(System.Guid, System.DateTime, int)
  type: Method
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/BLL/Services/ReservaService.cs
  assemblies:
  - BLL
  namespace: BLL.Services
  summary: Checks whether a space is available for the requested time slot (delegates to repository).
  example: []
  syntax:
    content: public bool VerificarDisponibilidad(Guid espacioId, DateTime fechaHora, int duracion)
    parameters:
    - id: espacioId
      type: System.Guid
      description: The space to check.
    - id: fechaHora
      type: System.DateTime
      description: Proposed start date and time.
    - id: duracion
      type: System.Int32
      description: Duration in minutes.
    return:
      type: System.Boolean
      description: <code>true</code> if no conflicting active reservation exists.
    content.vb: Public Function VerificarDisponibilidad(espacioId As Guid, fechaHora As Date, duracion As Integer) As Boolean
