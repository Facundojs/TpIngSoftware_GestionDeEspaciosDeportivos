  assemblies:
  - BLL
  namespace: BLL.Services
  summary: >-
    Returns reservations filtered by any combination of client, space, and minimum date.

    All returned DTOs have <code>ClienteNombre</code> and <code>EspacioNombre</code> hydrated.
  example: []
  syntax:
    content: public List<ReservaDTO> ListarReservas(Guid? clienteId, Guid? espacioId, DateTime? desde)
    parameters:
    - id: clienteId
      type: System.Nullable{System.Guid}
      description: Optional client filter.
    - id: espacioId
      type: System.Nullable{System.Guid}
      description: Optional space filter.
    - id: desde
      type: System.Nullable{System.DateTime}
      description: Optional minimum <code>FechaHora</code> filter.
    return:
      type: System.Collections.Generic.List{BLL.DTOs.ReservaDTO}
    content.vb: Public Function ListarReservas(clienteId As Guid?, espacioId As Guid?, desde As Date?) As List(Of ReservaDTO)
