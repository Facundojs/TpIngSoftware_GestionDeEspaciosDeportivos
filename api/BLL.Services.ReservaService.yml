- uid: BLL.Services.ReservaService.ObtenerHorariosDisponibles(System.Guid,System.DateTime)
  commentId: M:BLL.Services.ReservaService.ObtenerHorariosDisponibles(System.Guid,System.DateTime)
  id: ObtenerHorariosDisponibles(System.Guid,System.DateTime)
  parent: BLL.Services.ReservaService
  langs:
  - csharp
  - vb
  name: ObtenerHorariosDisponibles(Guid, DateTime)
  nameWithType: ReservaService.ObtenerHorariosDisponibles(Guid, DateTime)
  fullName: BLL.Services.ReservaService.ObtenerHorariosDisponibles(System.Guid, System.DateTime)
  type: Method
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/BLL/Services/ReservaService.cs
  assemblies:
  - BLL
  namespace: BLL.Services
  summary: Returns all free 30-minute time slots for a space on a given date based on the space's agenda.
  example: []
  syntax:
    content: public List<TimeSpan> ObtenerHorariosDisponibles(Guid espacioId, DateTime fecha)
    parameters:
    - id: espacioId
      type: System.Guid
      description: The space to query.
    - id: fecha
      type: System.DateTime
      description: The date to check (time component is ignored).
    return:
      type: System.Collections.Generic.List{System.TimeSpan}
      description: List of available start times as <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref> values.
    content.vb: Public Function ObtenerHorariosDisponibles(espacioId As Guid, fecha As Date) As List(Of TimeSpan)
  overload: BLL.Services.ReservaService.ObtenerHorariosDisponibles*
  exceptions:
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown with code <code>"ERR_NO_AGENDA"</code> if no agenda is configured for this space.
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown with code <code>"ERR_NO_AGENDA"</code> if the space has no configured schedule.
  nameWithType.vb: ReservaService.ObtenerHorariosDisponibles(Guid, Date)
  fullName.vb: BLL.Services.ReservaService.ObtenerHorariosDisponibles(System.Guid, Date)
