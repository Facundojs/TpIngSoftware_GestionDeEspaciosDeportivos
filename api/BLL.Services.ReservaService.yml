  assemblies:
  - BLL
  namespace: BLL.Services
  summary: Business logic service for reservation management.
  remarks: >-
    Handles availability computation, reservation creation (with race-condition guard),

    cancellation with automatic refunds, and receipt generation (non-fatal).

    All multi-step write operations run inside <xref href="DAL.Contracts.IUnitOfWork" data-throw-if-not-resolved="false"></xref> transactions.
