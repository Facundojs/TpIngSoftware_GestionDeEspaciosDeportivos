- uid: BLL.Services.ReservaService.GenerarReserva(BLL.DTOs.GenerarReservaDTO)
  commentId: M:BLL.Services.ReservaService.GenerarReserva(BLL.DTOs.GenerarReservaDTO)
  id: GenerarReserva(BLL.DTOs.GenerarReservaDTO)
  parent: BLL.Services.ReservaService
  langs:
  - csharp
  - vb
  name: GenerarReserva(GenerarReservaDTO)
  nameWithType: ReservaService.GenerarReserva(GenerarReservaDTO)
  fullName: BLL.Services.ReservaService.GenerarReserva(BLL.DTOs.GenerarReservaDTO)
  type: Method
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/BLL/Services/ReservaService.cs
  assemblies:
  - BLL
  namespace: BLL.Services
  summary: >-
    Creates a reservation with a down payment, guarding against race conditions via

    a double-checked availability lock inside the transaction.
  example: []
  syntax:
    content: public string GenerarReserva(GenerarReservaDTO dto)
    parameters:
    - id: dto
      type: BLL.DTOs.GenerarReservaDTO
      description: Reservation parameters including optional advance payment amount.
    return:
      type: System.String
      description: The generated reservation code (e.g., <code>"RES-123456-ABCD"</code>).
    content.vb: Public Function GenerarReserva(dto As GenerarReservaDTO) As String
  overload: BLL.Services.ReservaService.GenerarReserva*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: >-
      Thrown for invalid inputs: negative advance, zero duration, past date, advance exceeding total,

      or advance below the 10% minimum.
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown when the space is no longer available at transaction time (race condition).
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: Thrown for invalid amount, duration, or past date.
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown if the space is unavailable or the advance exceeds the total.
- uid: BLL.Services.ReservaService.CancelarReserva(System.Guid)
  commentId: M:BLL.Services.ReservaService.CancelarReserva(System.Guid)
  id: CancelarReserva(System.Guid)
  parent: BLL.Services.ReservaService
  langs:
  - csharp
  - vb
  name: CancelarReserva(Guid)
  nameWithType: ReservaService.CancelarReserva(Guid)
  fullName: BLL.Services.ReservaService.CancelarReserva(System.Guid)
  type: Method
  source:
    href: https://github.com/Facundojs/TpIngSoftware_GestionDeEspaciosDeportivos/blob/2272c49f848eaac0b4037f8324257b811b0e94c7/BLL/Services/ReservaService.cs
  assemblies:
  - BLL
  namespace: BLL.Services
  summary: >-
    Cancels a reservation: marks it <code>Cancelada</code>, inserts a reversal movement,

    and transitions all <code>Abonado</code> payments to <code>Reembolsado</code> with corresponding negative movements.
  example: []
  syntax:
    content: public void CancelarReserva(Guid reservaId)
    parameters:
    - id: reservaId
      type: System.Guid
      description: The reservation to cancel.
    content.vb: Public Sub CancelarReserva(reservaId As Guid)
  overload: BLL.Services.ReservaService.CancelarReserva*
  exceptions:
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown when the reservation does not exist, is already cancelled, or is finalized.
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown if the reservation is already cancelled or finalized.
